<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>神秘塔罗占卜 - 🔮</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1 class="title">✨ 神秘塔罗占卜 ✨</h1>
            <p class="subtitle">聆听内心的声音，探索命运的指引</p>
        </header>
        <main>
            <div class="draw-section" id="drawSection">
                <button class="draw-btn" id="drawBtn">
                    <span class="btn-text">抽取牌阵</span>
                    <span class="btn-icon">🔮</span>
                </button>
                <p class="instruction">点击抽取三张牌，解读你的命运</p>
            </div>
            <div class="cards-container" id="cardsContainer">
                <div class="card-slot" id="slot1"></div>
                <div class="card-slot" id="slot2"></div>
                <div class="card-slot" id="slot3"></div>
            </div>
            <div class="reading-section" id="readingSection">
                <h2 class="reading-title">🌟 牌面解读</h2>
                <div class="reading-content" id="readingContent"></div>
            </div>
        </main>
        <footer>
            <p>🌙 塔罗牌是探索内心的镜子，而非预言未来的水晶球 🌙</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
